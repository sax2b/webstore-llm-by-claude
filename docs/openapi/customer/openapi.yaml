openapi: 3.0.3
info:
  title: E-Commerce UI Integration API (Customer)
  version: 1.1.0
  description: >
    API Specification for UI integration. This document defines endpoints specifically 
    for Registered Customer flows, including AWS Cognito authentication.

paths:
  /:
    post:
      tags:
        - Authentication
      summary: AWS Cognito Authentication (Login & Verify)
      description: >
        Initiates or completes the authentication flow using AWS Cognito. 
        Note: This endpoint interfaces with an external AWS Cognito system.
      operationId: cognitoAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/CognitoLoginRequest'
                - $ref: '#/components/schemas/CognitoVerifyOTPRequest'
      responses:
        '200':
          description: Successful authentication, challenge initiation, or OTP verification.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CognitoLoginResponse'
                  - $ref: '#/components/schemas/CognitoVerifyOTPResponse'

  /shops/{shopId}/carts/current:
    get:
      tags:
        - Cart
      summary: Get current cart
      description: >
        Retrieves the authenticated customer's active shopping cart for a specific shop. 
        This includes all items added to the cart, price calculations, and current cart state.
      operationId: getCurrentCart
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          description: The unique identifier of the shop.
          schema:
            type: string
      responses:
        '200':
          description: The current shopping cart details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCartResponse'
    put:
      tags:
        - Cart
      summary: Update cart configuration
      description: >
        Updates the authenticated customer's active shopping cart with shipping or payment 
        configuration identifiers. Use this to bind selected shipping or payment methods 
        to the current checkout session.
      operationId: updateCart
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          description: The unique identifier of the shop.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartRequest'
      responses:
        '200':
          description: Successfully updated the shopping cart configuration.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: Internal status code. "000000" indicates success.
                  success:
                    type: boolean
                    description: Indicates if the operation was successful.

  /shops/{shopId}/carts/current/contents:
    post:
      tags:
        - Cart
      summary: Add items to current cart
      description: >
        Modifies the contents of the authenticated customer's active shopping cart. 
        Use this to add new items or update the quantity of existing products. 
        Specifying an amount of 0 for a product removes it from the cart.
      operationId: updateCartContent
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          description: The unique identifier of the shop.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartContentRequest'
      responses:
        '200':
          description: Successfully updated the shopping cart content.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: Internal status code. "000000" indicates success.
                  success:
                    type: boolean
                    description: Indicates if the operation was successful.

  /shops/{shopId}/profiles/current:
    get:
      tags:
        - Profile
      summary: Get current profile
      description: >
        Retrieves the authenticated customer's profile details for a specific shop.
        This includes identity information, membership status, and applicable discounts.
      operationId: getCurrentProfile
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          description: The unique identifier of the shop.
          schema:
            type: string
        - name: tier_discount
          in: query
          required: false
          description: Whether to include tier-based discount information in the response.
          schema:
            type: boolean
      responses:
        '200':
          description: The current customer profile details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfileResponse'

  /shops/{shopId}/orders:
    get:
      tags:
        - Order
      summary: List customer orders
      description: >
        Retrieves a list of orders for the authenticated customer in a specific shop. 
        This includes order status, billing/shipping addresses, and order contents.
      operationId: listOrders
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          description: The unique identifier of the shop.
          schema:
            type: string
      responses:
        '200':
          description: A list of customer orders and the total count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrdersResponse'

  /shops/{shopId}/profiles/current/addresses:
    get:
      tags:
        - Profile
      summary: List customer addresses
      description: >
        Retrieves a list of saved addresses in the authenticated customer's address book for a specific shop.
      operationId: listAddresses
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          description: The unique identifier of the shop.
          schema:
            type: string
      responses:
        '200':
          description: A list of customer addresses and the total count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAddressesResponse'

  /shops/{shopId}/payments/configs:
    get:
      tags:
        - Shop Configuration
      summary: List payment configurations
      description: >
        Retrieves the available payment methods and their configurations for a specific shop. 
        This includes details like payment providers, services, and channels.
      operationId: listPaymentConfigs
      security:
        - BearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          description: The unique identifier of the shop.
          schema:
            type: string
      responses:
        '200':
          description: A list of payment configurations and the total count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentConfigsResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Use the AccessToken obtained from the authentication flow.
  schemas:
    CognitoLoginRequest:
      type: object
      description: >
        Step 1: Initiation request to start the login process. 
        Use this to request an OTP (One-Time Password) to be sent to the user's email.
      properties:
        AuthFlow:
          type: string
          description: The authentication flow type. For email OTP login, use "USER_AUTH".
        AuthParameters:
          type: object
          description: Required parameters for initiating the authentication flow.
          properties:
            USERNAME:
              type: string
              description: The user's registered email address.
            PREFERRED_CHALLENGE:
              type: string
              description: The challenge type to trigger. Use "EMAIL_OTP" for email-based verification.
        ClientId:
          type: string
          description: The unique identifier for the AWS Cognito app client.

    CognitoVerifyOTPRequest:
      type: object
      description: >
        Step 2: Verification request used after receiving the OTP via email. 
        This completes the login process.
      properties:
        ChallengeName:
          type: string
          description: The name of the challenge being fulfilled. Use "EMAIL_OTP".
        ChallengeResponses:
          type: object
          description: The user's response to the authentication challenge.
          properties:
            USERNAME:
              type: string
              description: The user's registered email address.
            EMAIL_OTP_CODE:
              type: string
              description: The numeric code received via email from the step 1 (login) request.
        Session:
          type: string
          description: >
            The very long session string returned in the response of the step 1 (login) request. 
            Required to link the verification to the initial request.
        ClientId:
          type: string
          description: The unique identifier for the AWS Cognito app client.

    CognitoLoginResponse:
      type: object
      description: Response from the Step 1 (Initiation) request.
      properties:
        AvailableChallenges:
          type: array
          items:
            type: string
          description: List of challenges available to the user (e.g., "EMAIL_OTP", "PASSWORD").
        ChallengeName:
          type: string
          description: The specific challenge the user must now fulfill (e.g., "EMAIL_OTP").
        ChallengeParameters:
          type: object
          description: Details about how the challenge code was delivered.
          properties:
            CODE_DELIVERY_DELIVERY_MEDIUM:
              type: string
              description: The medium used (e.g., "EMAIL").
            CODE_DELIVERY_DESTINATION:
              type: string
              description: The masked email address where the code was sent.
        Session:
          type: string
          description: >
            A critical, very long session string that MUST be passed to the 
            Step 2 (Verification) request.

    CognitoVerifyOTPResponse:
      type: object
      description: Response from the Step 2 (Verification) request containing final tokens.
      properties:
        AuthenticationResult:
          type: object
          description: The result of successful authentication containing session tokens.
          properties:
            AccessToken:
              type: string
              description: The JWT access token. Use this to authorize subsequent requests to the Customer API.
            RefreshToken:
              type: string
              description: Token used to obtain new access tokens when the current one expires.
            IdToken:
              type: string
              description: The ID token containing user identity claims.
            ExpiresIn:
              type: integer
              description: Time in seconds until the AccessToken expires.
            TokenType:
              type: string
              description: The type of token issued (e.g., "Bearer").
        ChallengeParameters:
          type: object
          description: Additional challenge parameters. Typically empty for successful verification.

    GetCartResponse:
      type: object
      description: Standard response envelope for getting the current cart.
      properties:
        code:
          type: string
          description: Internal status code. "000000" indicates success.
        success:
          type: boolean
          description: Indicates if the request was processed successfully.
        results:
          type: object
          properties:
            shopping_cart:
              $ref: '#/components/schemas/ShoppingCart'
    
    ShoppingCart:
      type: object
      description: Detailed information about the customer's shopping cart.
      properties:
        id:
          type: string
          description: Unique identifier for the cart.
        shop_id:
          type: string
          description: Identifier of the shop this cart belongs to.
        created_by:
          type: string
          description: Identifier of the user who created the cart.
        created_on:
          type: integer
          description: Unix timestamp (seconds) when the cart was created.
        edited_by:
          type: string
          description: Identifier of the user who last modified the cart.
        edited_on:
          type: integer
          description: Unix timestamp (seconds) when the cart was last modified.
        request_ip:
          type: string
          description: IP address from which the cart was last accessed.
        request_country:
          type: string
          description: Two-letter ISO country code of the request origin.
        state:
          type: string
          description: The current lifecycle state of the cart (e.g., "draft").
        customer_id:
          type: string
          description: Unique identifier of the customer owning this cart.
        customer_platform:
          type: string
          description: The platform through which the customer is accessing the service.
        customer_type:
          type: string
          description: The type of customer account.
        membership_tier_id:
          type: string
          description: Identifier for the customer's membership tier.
        membership_tier_name:
          type: string
          description: Human-readable name of the membership tier.
        cart_id:
          type: string
          description: Redundant identifier for the cart, often same as 'id'.
        payment_authorize_url:
          type: string
          description: URL to redirect the user for payment authorization, if applicable.
        payment_expire_on:
          type: integer
          description: Unix timestamp when the payment session expires.
        contents:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          description: List of items currently in the cart.
        currency:
          type: string
          description: Three-letter ISO currency code (e.g., "thb").
        subtotal:
          type: integer
          description: Total price of all items before discounts, in the smallest currency unit.
        discount:
          type: integer
          description: Total discount amount applied to the cart, in the smallest currency unit.
        nettotal:
          type: integer
          description: Subtotal minus discounts, in the smallest currency unit.
        vat:
          type: integer
          description: Value Added Tax amount, in the smallest currency unit.
        shipping:
          type: integer
          description: Shipping fee, in the smallest currency unit.
        shipping_discount:
          type: integer
          description: Discount applied specifically to shipping, in the smallest currency unit.
        total:
          type: integer
          description: Final total amount to be paid, in the smallest currency unit.
        valid:
          type: boolean
          description: Indicates if the cart is currently valid for checkout.

    CartItem:
      type: object
      description: Represents an individual item within the shopping cart.
      properties:
        product_id:
          type: string
          description: Unique identifier of the product.
        shop_id:
          type: string
          description: Identifier of the shop where the product is listed.
        inventory_type:
          type: string
          description: The type of inventory management used for this item.
        item_id:
          type: string
          description: Unique identifier for the specific variant or item instance.
        title:
          type: string
          description: Display title of the product.
        name:
          type: string
          description: Internal or specific name of the item variant.
        type:
          type: string
          description: Product category type (e.g., "digital").
        sku:
          type: string
          description: Stock Keeping Unit identifier.
        price:
          type: integer
          description: Unit price of the item in the smallest currency unit.
        list_price:
          type: number
          description: Original price of the item for display.
        currency:
          type: string
          description: Currency code for the item.
        image:
          type: string
          description: Absolute URL to the product's primary image.
        category:
          type: string
          description: Product category name.
        amount:
          type: integer
          description: Quantity of the item in the cart.

    GetProfileResponse:
      type: object
      description: Standard response envelope for getting the current profile.
      properties:
        code:
          type: string
          description: Internal status code. "000000" indicates success.
        success:
          type: boolean
          description: Indicates if the request was processed successfully.
        results:
          type: object
          properties:
            profile:
              $ref: '#/components/schemas/Profile'

    Profile:
      type: object
      description: Detailed information about the customer's profile.
      properties:
        id:
          type: string
          description: Unique identifier for the profile.
        shop_id:
          type: string
          description: Identifier of the shop this profile belongs to.
        created_by:
          type: string
          description: Identifier of the user who created the profile.
        created_on:
          type: integer
          description: Unix timestamp (seconds) when the profile was created.
        edited_by:
          type: string
          description: Identifier of the user who last modified the profile.
        edited_on:
          type: integer
          description: Unix timestamp (seconds) when the profile was last modified.
        customer_id:
          type: string
          description: Unique identifier of the customer.
        registered:
          type: boolean
          description: Indicates if the customer is registered.
        display_name:
          type: string
          description: The name displayed for the customer.
        first_name:
          type: string
          description: The customer's first name.
        last_name:
          type: string
          description: The customer's last name.
        image_url:
          type: string
          description: URL to the customer's profile image.
        email:
          type: string
          description: The customer's email address.
        email_verified:
          type: boolean
          description: Indicates if the email address has been verified.
        phone:
          type: string
          description: The customer's phone number.
        phone_verified:
          type: boolean
          description: Indicates if the phone number has been verified.
        default_language:
          type: string
          description: The customer's preferred language (e.g., "en-US").
        membership_tier_id:
          type: string
          description: Identifier for the customer's membership tier.
        membership_tier_name:
          type: string
          description: Human-readable name of the membership tier.
        membership_tier_icon_url:
          type: string
          description: URL to the icon representing the membership tier.
        membership_tier_text_color:
          type: string
          description: Hex color code for the membership tier text.
        membership_tier_bg_color:
          type: string
          description: Hex color code for the membership tier background.
        discount:
          type: array
          items:
            $ref: '#/components/schemas/ProfileDiscount'
          description: List of discounts applicable to the customer.
        platform:
          type: string
          description: The platform through which the profile is managed.

    GetPaymentConfigsResponse:
      type: object
      description: Standard response envelope for listing payment configurations.
      properties:
        code:
          type: string
          description: Internal status code. "000000" indicates success.
        success:
          type: boolean
          description: Indicates if the request was processed successfully.
        results:
          type: object
          properties:
            payment_configs:
              type: array
              items:
                $ref: '#/components/schemas/PaymentConfig'
              description: List of available payment methods and their settings.
            count:
              type: integer
              description: Total number of payment configurations returned.

    PaymentConfig:
      type: object
      description: Detailed information about a shop's payment configuration.
      properties:
        id:
          type: string
          description: Unique identifier for the payment configuration record.
        created_by:
          type: string
          description: Identifier of the user who created this configuration.
        created_on:
          type: integer
          description: Unix timestamp (seconds) when the configuration was created.
        edited_by:
          type: string
          description: Identifier of the user who last modified this configuration.
        edited_on:
          type: integer
          description: Unix timestamp (seconds) when the configuration was last modified.
        shop_id:
          type: string
          description: Identifier of the shop this payment configuration belongs to.
        name:
          type: string
          description: Human-readable name of the payment method (e.g., "Omise - PromptPay").
        description:
          type: string
          description: Detailed explanation or instructions for this payment method.
        payment_service:
          type: string
          description: The core payment service being used (e.g., "botiopay").
        payment_service_id:
          type: string
          description: Unique identifier for the underlying payment service instance.
        payment_provider:
          type: string
          description: The third-party payment provider (e.g., "omise", "ksher", "seller").
        payment_channel:
          type: string
          description: The specific payment channel used (e.g., "promptpay", "cash", "credit_card_token").
        pos_only:
          type: boolean
          description: Indicates if this payment method is restricted to Point of Sale (POS) use only.

    GetAddressesResponse:
      type: object
      description: Standard response envelope for listing customer addresses.
      properties:
        code:
          type: string
          description: Internal status code. "000000" indicates success.
        success:
          type: boolean
          description: Indicates if the request was processed successfully.
        results:
          type: object
          properties:
            addresses:
              type: array
              items:
                $ref: '#/components/schemas/AddressBookEntry'
              description: List of saved addresses in the customer's address book.
            count:
              type: integer
              description: Total number of addresses returned in the current request.

    AddressBookEntry:
      type: object
      description: Represents an individual entry in the customer's address book.
      properties:
        id:
          type: string
          description: Unique identifier for the address book entry record.
        created_by:
          type: string
          description: Identifier of the user who created this address entry.
        created_on:
          type: integer
          description: Unix timestamp (seconds) when the address entry was created.
        edited_by:
          type: string
          description: Identifier of the user who last modified this address entry.
        edited_on:
          type: integer
          description: Unix timestamp (seconds) when the address entry was last modified.
        shop_id:
          type: string
          description: Identifier of the shop this address entry is associated with.
        customer_id:
          type: string
          description: Unique identifier of the customer who owns this address entry.
        name:
          type: string
          description: User-defined label or name for this address entry (e.g., "Home", "Office").
        address:
          $ref: '#/components/schemas/Address'
        default:
          type: boolean
          description: Indicates if this is the customer's default address.

    GetOrdersResponse:
      type: object
      description: Standard response envelope for listing customer orders.
      properties:
        code:
          type: string
          description: Internal status code. "000000" indicates success.
        success:
          type: boolean
          description: Indicates if the request was processed successfully.
        results:
          type: object
          properties:
            orders:
              type: array
              items:
                $ref: '#/components/schemas/Order'
              description: List of order details for the customer.
            count:
              type: integer
              description: Total number of orders returned in the current request.

    Order:
      type: object
      description: Detailed information about a customer order.
      properties:
        id:
          type: string
          description: Unique identifier for the order record.
        shop_id:
          type: string
          description: Identifier of the shop where the order was placed.
        created_on:
          type: integer
          description: Unix timestamp (seconds) when the order was created.
        edited_on:
          type: integer
          description: Unix timestamp (seconds) when the order was last modified.
        state:
          type: string
          description: The current lifecycle state or status of the order (e.g., "paid").
        customer_id:
          type: string
          description: Unique identifier of the customer who placed the order.
        customer_platform:
          type: string
          description: The platform or source through which the customer placed the order.
        order_provider:
          type: string
          description: The backend service or provider managing the order.
        order_id:
          type: string
          description: Provider-specific unique identifier for the order.
        order_number:
          type: string
          description: Human-readable reference number for the order.
        payment_url:
          type: string
          description: Direct link to the payment processing page for this order.
        payment_authorize_url:
          type: string
          description: URL to redirect the user for payment authorization, if required.
        payment_expire_on:
          type: integer
          description: Unix timestamp when the payment link or authorization session expires.
        invoice_id:
          type: string
          description: Unique identifier for the invoice associated with this order.
        invoice_number:
          type: string
          description: Human-readable reference number for the invoice.
        billing_address:
          $ref: '#/components/schemas/Address'
        shipping_address:
          $ref: '#/components/schemas/Address'
        contents:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          description: List of products or items included in this order.
        subtotal:
          type: integer
          description: Total price of all items before discounts and taxes, in the smallest currency unit.
        discount:
          type: integer
          description: Total discount amount applied to the order, in the smallest currency unit.
        nettotal:
          type: integer
          description: Subtotal minus discounts, in the smallest currency unit.
        vat:
          type: integer
          description: Value Added Tax amount, in the smallest currency unit.
        shipping:
          type: integer
          description: Shipping fee charged for the order, in the smallest currency unit.
        shipping_discount:
          type: integer
          description: Discount applied specifically to shipping, in the smallest currency unit.
        total:
          type: integer
          description: Final total amount paid or to be paid, in the smallest currency unit.
        item_count:
          type: integer
          description: Total number of individual items in the order.
        customer_name:
          type: string
          description: The name of the customer as recorded for this order.

    Address:
      type: object
      description: Geographic and contact information for billing or shipping.
      properties:
        name:
          type: string
          description: Full name of the contact person or recipient.
        email:
          type: string
          description: Contact email address associated with the address.
        telephone:
          type: string
          description: Contact telephone number.
        tax_id:
          type: string
          description: Tax identification number, if applicable.
        tax_brance:
          type: string
          description: Tax branch identifier, if applicable.
        street:
          type: string
          description: Primary street address or building details.
        street2:
          type: string
          description: Additional street address details.
        street3:
          type: string
          description: Further street address details.
        zipcode:
          type: string
          description: Postal or ZIP code.
        sub_city:
          type: string
          description: Sub-district or neighborhood.
        city:
          type: string
          description: District or city.
        state:
          type: string
          description: Province, state, or region.
        country:
          type: string
          description: Country name.
        lat:
          type: string
          description: Latitude coordinate for the location.
        long:
          type: string
          description: Longitude coordinate for the location.

    OrderItem:
      type: object
      description: Represents an individual product or item within an order.
      properties:
        product_id:
          type: string
          description: Unique identifier of the product.
        shop_id:
          type: string
          description: Identifier of the shop where the product was purchased.
        inventory_type:
          type: string
          description: The type of inventory management used for this item.
        inventory_id:
          type: string
          description: Unique identifier for the specific inventory record.
        item_id:
          type: string
          description: Unique identifier for the specific item variant.
        title:
          type: string
          description: Display title of the product.
        name:
          type: string
          description: Specific name or variant description of the item.
        type:
          type: string
          description: Category or type of the product (e.g., "physical").
        sku:
          type: string
          description: Stock Keeping Unit identifier.
        price:
          type: integer
          description: Unit price of the item in the smallest currency unit.
        list_price:
          type: number
          description: Original or reference price of the item.
        currency:
          type: string
          description: Three-letter ISO currency code.
        image:
          type: string
          description: Absolute URL to the product image.
        category:
          type: string
          description: Product category name.
        amount:
          type: integer
          description: Quantity of the item included in the order.

    ProfileDiscount:
      type: object
      description: Represents a discount applicable to the customer profile.
      properties:
        product_category:
          type: string
          description: The category of products the discount applies to.
        discount:
          type: integer
          description: The discount value in the smallest currency unit.
        name:
          type: string
          description: Name of the discount.
        description:
          type: string
          description: A brief explanation of the discount.
        icon_url:
          type: string
          description: URL to an icon representing the discount.

    UpdateCartContentRequest:
      type: object
      description: Request payload for updating the customer's shopping cart.
      required:
        - product_id
        - amount
      properties:
        product_id:
          type: string
          description: Unique identifier of the product to add or update in the cart.
        amount:
          type: integer
          description: >
            The quantity of the product. Set to 0 to remove the product 
            from the shopping cart.

    UpdateCartRequest:
      type: object
      description: Request payload for updating cart-level metadata and configuration.
      properties:
        shipping_id:
          type: string
          description: Unique identifier for the selected shipping method configuration.
        payment_id:
          type: string
          description: Unique identifier for the selected payment method configuration.
